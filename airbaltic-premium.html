<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>airBaltic Premium - New Routes Collection</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

    :root {
      --bg: #071a38;
      --surface: #0f2b57;
      --surface-2: #143568;
      --text: #f1f6ff;
      --muted: #b8cae8;
      --brand: #9bcc3b;
      --brand-dark: #6b9520;
      --line: #315488;
      --gold: #d7bf79;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 600px at 10% -15%, rgba(155, 204, 59, 0.16), transparent 60%),
        radial-gradient(900px 520px at 90% -20%, rgba(215, 191, 121, 0.12), transparent 62%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand-logo {
      width: 124px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .lang-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-btn {
      border: 1px solid #3a5e92;
      background: #143461;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .lang-btn:hover { border-color: var(--gold); }
    .lang-btn.active {
      background: var(--brand);
      color: #1e2909;
      border-color: var(--brand);
    }

    .hero {
      background: linear-gradient(170deg, #133664 0%, #102a52 100%);
      border: 1px solid #3a5f93;
      border-radius: 16px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.3);
    }

    .brand-strip {
      margin: -28px -28px 18px;
      padding: 10px 16px;
      background: linear-gradient(90deg, var(--brand) 0 20%, #102850 20% 100%);
      color: #22310d;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 12px;
      border-bottom: 1px solid #315687;
    }

    .brand-strip span {
      color: #e8f0ff;
      margin-left: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 193, 125, 0.18), transparent 72%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.02em;
      max-width: 800px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 2.2vw, 18px);
      max-width: 760px;
    }

    .cta-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--brand);
      color: #1f290c;
    }

    .btn-secondary {
      background: rgba(14, 38, 74, 0.55);
      border: 1px solid #466ea5;
      color: #ffffff;
    }

    .stats-row {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      max-width: 760px;
      position: relative;
      z-index: 1;
    }

    .stat {
      border: 1px solid #375d92;
      border-radius: 10px;
      background: rgba(10, 30, 59, 0.55);
      padding: 10px 12px;
    }

    .stat strong {
      display: block;
      color: var(--brand);
      font-size: 19px;
      line-height: 1.1;
    }

    .stat span {
      color: #9fb5d6;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-visual {
      margin-top: 18px;
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .flight-track {
      width: min(760px, 100%);
      height: 62px;
      border: 1px solid #355a8f;
      border-radius: 999px;
      background:
        radial-gradient(circle at 24% 50%, rgba(155, 204, 59, 0.7) 0 6px, transparent 7px),
        radial-gradient(circle at 52% 50%, rgba(217, 193, 125, 0.6) 0 6px, transparent 7px),
        radial-gradient(circle at 80% 50%, rgba(155, 204, 59, 0.7) 0 6px, transparent 7px),
        linear-gradient(90deg, rgba(155, 204, 59, 0.14), rgba(217, 193, 125, 0.16));
      position: relative;
      overflow: hidden;
    }

    .flight-track::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 2px dashed rgba(206, 220, 241, 0.4);
    }

    .flight-track::after {
      content: "✈";
      position: absolute;
      left: 49%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #223109;
      background: var(--brand);
      box-shadow: 0 0 0 4px rgba(155, 204, 59, 0.18);
      font-size: 14px;
    }

    .visual-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #3d6296;
      background: #12345f;
      color: #dbe6f9;
    }

    .chip.hot {
      border-color: #d9c17d;
      background: #1a3e71;
    }

    .routes-overview {
      margin-top: 22px;
      border: 1px solid #3a5f92;
      border-radius: 14px;
      background: linear-gradient(180deg, #102d5a, #0e2952);
      padding: 16px;
    }

    .routes-overview h3 {
      margin: 0;
      color: #f0f4fd;
      font-size: 20px;
    }

    .routes-overview p {
      margin: 6px 0 14px;
      color: #aac0e2;
    }

    .routes-overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .routes-overview-card {
      border: 1px solid #3d6297;
      border-radius: 10px;
      background: rgba(10, 30, 58, 0.62);
      padding: 12px;
    }

    .routes-overview-card h4 {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 15px;
    }

    .routes-overview-list {
      margin: 0;
      padding-left: 18px;
      color: #dbe6f9;
      line-height: 1.45;
      font-size: 13px;
    }

    footer {
      margin-top: 20px;
      color: #93add2;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

    <div class="topbar">
      <img class="brand-logo" src="./airbaltic-logo.svg" alt="airBaltic logo" />
      <div class="lang-buttons" id="langButtons"></div>

    <section class="hero">

      <div class="hero-visual">

    <section class="routes-overview" id="routesSection">

      brandStripLead: "brandStripLead",
      brandStripTrail: "brandStripTrail",

      ctaPrimary: "ctaPrimary",
      ctaSecondary: "ctaSecondary",
      statRoutesLabel: "statRoutesLabel",
      statCitiesLabel: "statCitiesLabel",
      statSeasonLabel: "statSeasonLabel",
      allRoutesTitle: "allRoutesTitle",
      allRoutesIntro: "allRoutesIntro",
      footnote: "footnote"
    };

    let currentLang = "en";

    function renderAllRoutesPanel(t) {
      const groups = [
        { title: t.routesA, items: t.listA },
        { title: t.routesB, items: t.listB },
        { title: t.routesC, items: t.listC },
        { title: t.routesD, items: t.listD },
        { title: t.routesE, items: t.listE }
      ];
      document.getElementById("allRoutesGrid").innerHTML = groups
        .map((group) => `
          <article class="routes-overview-card">
            <h4>${group.title}</h4>
            <ul class="routes-overview-list">
              ${group.items.map((item) => `<li>${item}</li>`).join("")}
            </ul>
          </article>
        `)
        .join("");
    }

    function setLanguage(lang) {
      const t = translations[lang];
      currentLang = lang;
      document.title = t.pageTitle;
      Object.keys(ids).forEach((key) => {
        document.getElementById(ids[key]).textContent = t[key];
      });
      const chips = [...t.listA.slice(0, 4), ...t.listB.slice(0, 2)];
      document.getElementById("routeChips").innerHTML = chips
        .map((item, index) => `<span class="chip ${index < 2 ? "hot" : ""}">${item}</span>`)
        .join("");
      renderAllRoutesPanel(t);
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang;
    }

    function buildLanguageButtons() {
      const root = document.getElementById("langButtons");
      Object.keys(translations).forEach((lang) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.dataset.lang = lang;
        btn.type = "button";
        btn.textContent = translations[lang].label;
        btn.addEventListener("click", () => setLanguage(lang));
        root.appendChild(btn);
      });
    }

    function wireCtaActions() {
      const primary = document.getElementById("ctaPrimary");
      const secondary = document.getElementById("ctaSecondary");
      const routesSection = document.getElementById("routesSection");

      primary.href = "https://www.airbaltic.com/";
      primary.target = "_blank";
      primary.rel = "noopener noreferrer";

      secondary.href = "#routesSection";
      secondary.addEventListener("click", (event) => {
        event.preventDefault();
        routesSection.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    const initialLang = new URLSearchParams(window.location.search).get("lang") || "en";
    buildLanguageButtons();
    wireCtaActions();
    setLanguage(translations[initialLang] ? initialLang : "en");
  </script>

</html>
