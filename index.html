<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>airBaltic - New Routes Campaign</title>

    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #eef3fb;
      --card: #ffffff;
      --text: #122038;
      --muted: #53627f;
      --brand: #9bcc3b;
      --brand-dark: #6b9520;
      --accent: #113b79;
      --line: #d6e0ee;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .brand-logo {
      width: 124px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .lang-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-btn {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .lang-btn:hover { border-color: var(--accent); }
    .lang-btn.active {
      background: var(--brand);
      color: #122100;
      border-color: var(--brand);
    }

    .hero {
      background: linear-gradient(160deg, #ffffff 0%, #f5f8ff 100%);
      border: 1px solid #cdd9eb;
      border-radius: 20px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(15, 39, 74, 0.08);
    }

    .brand-strip {
      margin: -28px -28px 18px;
      padding: 10px 16px;
      background: linear-gradient(90deg, var(--brand) 0 26%, #113b79 26% 100%);
      color: #102000;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 12px;
    }

    .brand-strip span {
      color: #ecf3ff;
      margin-left: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(17, 59, 121, 0.14), transparent 70%);
    }

    .hero-visual {
      margin-top: 18px;
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .flight-track {
      width: min(760px, 100%);
      height: 74px;
      border: 1px solid #cfdbed;
      border-radius: 999px;
      background:
        radial-gradient(circle at 24% 50%, rgba(155, 221, 0, 0.55) 0 7px, transparent 8px),
        radial-gradient(circle at 52% 50%, rgba(17, 59, 121, 0.32) 0 7px, transparent 8px),
        radial-gradient(circle at 80% 50%, rgba(155, 221, 0, 0.55) 0 7px, transparent 8px),
        linear-gradient(90deg, rgba(155, 204, 59, 0.14), rgba(17, 59, 121, 0.08));
      position: relative;
      overflow: hidden;
    }

    .flight-track::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 2px dashed rgba(79, 98, 128, 0.3);
    }

    .flight-track::after {
      content: "✈";
      position: absolute;
      left: 49%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #102000;
      background: var(--brand);
      box-shadow: 0 0 0 5px rgba(155, 221, 0, 0.16);
      font-size: 16px;
    }

    .visual-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #d5dfec;
      background: #f6f9ff;
      color: #23324d;
    }

    .chip.hot {
      border-color: #c6dc9c;
      background: #f1f8e3;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.12;
      max-width: 780px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 2.2vw, 18px);
      max-width: 760px;
    }

    .cta-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--brand);
      color: #102000;
    }

    .btn-secondary {
      background: #113b79;
      border: 1px solid #0c2f5f;
      color: #ffffff;
    }

    .stats-row {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      max-width: 760px;
      position: relative;
      z-index: 1;
    }

    .stat {
      border: 1px solid #d4deed;
      border-radius: 12px;
      background: #f7faff;
      padding: 10px 12px;
    }

    .stat strong {
      display: block;
      color: var(--brand);
      font-size: 19px;
      line-height: 1.1;
    }

    .stat span {
      color: #6a7892;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      min-height: 145px;
      box-shadow: 0 8px 20px rgba(15, 39, 74, 0.06);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .route-list {
      margin: 0;
      padding-left: 17px;
      color: #2f3c54;
      line-height: 1.5;
      font-size: 14px;
    }

    .route-list li { margin-bottom: 3px; }

    .routes-overview {
      margin-top: 22px;
      border: 1px solid #d0dced;
      border-radius: 16px;
      background: linear-gradient(165deg, #ffffff 0%, #f4f8ff 100%);
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 39, 74, 0.06);
    }

    .routes-overview h3 {
      margin: 0;
      color: #113b79;
      font-size: 24px;
    }

    .routes-overview .intro {
      margin: 6px 0 14px;
      color: #324158;
    }

    .routes-detail-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 980px) {
      .routes-detail-layout {
        grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.05fr);
      }
    }

    .routes-base-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .base-btn {
      border: 1px solid #d8e2f0;
      background: #f6f9ff;
      color: #1f3150;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .base-btn.active {
      border-color: #113b79;
      background: #113b79;
      color: #ffffff;
    }

    .base-destinations {
      border: 1px solid #d8e2f0;
      border-radius: 12px;
      background: #fbfdff;
      padding: 12px;
      min-height: 120px;
    }

    .base-destinations h4 {
      margin: 0 0 8px;
      color: #113b79;
      font-size: 16px;
    }

    .map-card h4 {
      margin: 0;
      color: #113b79;
      font-size: 18px;
    }

    .map-card p {
      margin: 6px 0 10px;
      color: #324158;
      font-size: 14px;
    }

    #routeMap {
      height: 360px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d8e2f0;
      overflow: hidden;
    }

    .promo {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .panel {
      background: linear-gradient(165deg, #ffffff 0%, #f4f8ff 100%);
      border: 1px solid #d0dced;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 39, 74, 0.06);
    }

    .panel-title {
      font-size: 14px;
      color: #113b79;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 800;
    }

    .ad-copy {
      margin: 0;
      color: #324158;
      line-height: 1.55;
    }

    footer {
      margin-top: 20px;
      color: #6b7b96;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

      hamburg: { label: "Hamburg", lat: 53.5511, lng: 9.9937 },
      poznan: { label: "Poznan", lat: 52.4064, lng: 16.9252 },
      katowice: { label: "Katowice", lat: 50.2649, lng: 19.0238 },
      liege: { label: "Liege", lat: 50.6326, lng: 5.5797 },
      ljubljana: { label: "Ljubljana", lat: 46.0569, lng: 14.5058 },
      palanga: { label: "Palanga", lat: 55.9203, lng: 21.0676 },
      berlin: { label: "Berlin", lat: 52.52, lng: 13.405 },
      manchester: { label: "Manchester", lat: 53.4808, lng: -2.2426 },
      londonGatwick: { label: "London Gatwick", lat: 51.1537, lng: -0.1821 }
    };

    const routeNetwork = [
      { origin: "riga", destinations: ["kaunas", "warsaw", "oulu", "antalya", "gothenburg", "kuusamo"] },
      { origin: "tallinn", destinations: ["vienna", "hamburg"] },
      { origin: "granCanaria", destinations: ["warsaw", "poznan", "katowice", "liege"] },
      { origin: "tenerife", destinations: ["liege", "ljubljana", "palanga"] },
      { origin: "kuusamo", destinations: ["berlin", "hamburg", "manchester", "londonGatwick"] }
    ];

    let routeMap;
    let routeLayers;
    let selectedBaseMode = "all";

    function renderList(targetId, items) {
      const el = document.getElementById(targetId);
      el.innerHTML = items.map((item) => `<li>${item}</li>`).join("");
    }

    function setLanguage(lang) {
      const t = translations[lang];
      Object.keys(ids).forEach((key) => {
        document.getElementById(ids[key]).textContent = t[key];
      });
      const chips = [...t.listA.slice(0, 4), ...t.listB.slice(0, 2)];
      document.getElementById("routeChips").innerHTML = chips
        .map((item, index) => `<span class="chip ${index < 2 ? "hot" : ""}">${item}</span>`)
        .join("");
      renderAllRoutesPanel(t);
      renderRouteMap();

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang;
    }

    function setupRouteMap() {
      routeMap = L.map("routeMap", { zoomControl: true, preferCanvas: true }).setView([53.3, 14.0], 4);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
        maxZoom: 8,
        subdomains: "abcd",
        attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
      }).addTo(routeMap);
      routeLayers = L.layerGroup().addTo(routeMap);
    }

    function renderRouteMap() {
      if (!routeMap || !routeLayers) return;
      routeLayers.clearLayers();
      const citySet = new Set();
      const bounds = [];
      const allowedOrigins =
        selectedBaseMode === "all"
          ? ["riga", "tallinn", "granCanaria", "tenerife", "kuusamo"]
          : selectedBaseMode === "tenerifeKuusamo"
            ? ["tenerife", "kuusamo"]
            : [selectedBaseMode];

      routeNetwork.forEach((route) => {
        if (!allowedOrigins.includes(route.origin)) return;
        const origin = cityMapData[route.origin];
        citySet.add(route.origin);
        bounds.push([origin.lat, origin.lng]);
        route.destinations.forEach((destinationKey) => {
          const destination = cityMapData[destinationKey];
          citySet.add(destinationKey);
          bounds.push([destination.lat, destination.lng]);
          const curvePath = [
            [origin.lat, origin.lng],
            [(origin.lat + destination.lat) / 2, (origin.lng + destination.lng) / 2],
            [destination.lat, destination.lng]
          ];
          L.polyline(curvePath, { color: "#9bcc3b", weight: 5, opacity: 0.12, lineCap: "round" }).addTo(routeLayers);
          L.polyline(curvePath, { color: "#6ea700", weight: 2.2, opacity: 0.9, lineCap: "round" }).addTo(routeLayers);
        });
      });

      citySet.forEach((cityKey) => {
        const city = cityMapData[cityKey];
        const isOrigin = routeNetwork.some((r) => r.origin === cityKey);
        L.circleMarker([city.lat, city.lng], {
          radius: isOrigin ? 6.6 : 4.4,
          color: isOrigin ? "#1b3561" : "#6ea700",
          fillColor: isOrigin ? "#9bcc3b" : "#f7fbef",
          fillOpacity: 1,
          weight: isOrigin ? 2.4 : 1.8
        })
          .bindTooltip(city.label, { permanent: false, direction: "top", offset: [0, -6], opacity: 0.95 })
          .addTo(routeLayers);
      });

      if (bounds.length > 0) {
        routeMap.fitBounds(bounds, { padding: [24, 24] });
      }
      setTimeout(() => routeMap.invalidateSize(), 0);
    }

    function renderAllRoutesPanel(t) {
      const groups = [
        { key: "riga", title: t.routesA, items: t.listA },
        { key: "tallinn", title: t.routesB, items: t.listB },
        { key: "granCanaria", title: t.routesC, items: t.listC },
        { key: "tenerifeKuusamo", title: t.routesD, items: t.listD }
      ];
      const tabsRoot = document.getElementById("baseTabs");
      const baseTitle = document.getElementById("baseTitle");
      const baseList = document.getElementById("baseDestinationsList");

      function selectBase(index) {
        if (index === -1) {
          selectedBaseMode = "all";
          baseTitle.textContent = t.allBases || "All bases";
          baseList.innerHTML = groups.map((g) => `<li><strong>${g.title}:</strong> ${g.items.join(", ")}</li>`).join("");
          tabsRoot.querySelectorAll(".base-btn").forEach((btn, btnIndex) => btn.classList.toggle("active", btnIndex === 0));
          renderRouteMap();
          return;
        }
        const selected = groups[index];
        selectedBaseMode = selected.key;
        baseTitle.textContent = selected.title;
        baseList.innerHTML = selected.items.map((item) => `<li>${item}</li>`).join("");
        tabsRoot.querySelectorAll(".base-btn").forEach((btn, btnIndex) => btn.classList.toggle("active", btnIndex === index + 1));
        renderRouteMap();
      }

      tabsRoot.innerHTML = "";
      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.className = "base-btn";
      allBtn.textContent = t.allBases || "All bases";
      allBtn.addEventListener("click", () => selectBase(-1));
      tabsRoot.appendChild(allBtn);
      groups.forEach((group, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "base-btn";
        btn.textContent = group.title;
        btn.addEventListener("click", () => selectBase(index));
        tabsRoot.appendChild(btn);
      });
      selectBase(-1);
    }

    function buildLanguageButtons() {
      const root = document.getElementById("langButtons");
      Object.keys(translations).forEach((lang) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.dataset.lang = lang;
        btn.type = "button";
        btn.textContent = translations[lang].label;
        btn.addEventListener("click", () => setLanguage(lang));
        root.appendChild(btn);
      });
    }

    function wireCtaActions() {
      const primary = document.getElementById("ctaPrimary");
      const secondary = document.getElementById("ctaSecondary");
      const routesSection = document.getElementById("routesSection");

      primary.href = "https://www.airbaltic.com/en/book-flights";
      primary.target = "_blank";
      primary.rel = "noopener noreferrer";

      secondary.href = "#routesSection";
      secondary.addEventListener("click", (event) => {
        event.preventDefault();
        routesSection.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    setupRouteMap();
    buildLanguageButtons();
    wireCtaActions();
    setLanguage("en");
  </script>
</body>
</html>
