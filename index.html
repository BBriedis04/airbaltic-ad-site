<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>airBaltic - New Routes Campaign</title>
  <style>
    :root {
      --bg: #0c1220;
      --card: #121b2f;
      --text: #eaf1ff;
      --muted: #a8b9dd;
      --brand: #9bdd00;
      --brand-dark: #6ea700;
      --accent: #3ba4ff;
      --line: #243253;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, #1b2b50 0%, transparent 60%),
        radial-gradient(900px 500px at 90% -20%, #0f2c57 0%, transparent 55%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .plane {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(140deg, var(--brand) 0%, #c2ff36 100%);
      color: #112200;
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: 0 8px 22px rgba(155, 221, 0, 0.25);
    }

    .lang-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-btn {
      border: 1px solid var(--line);
      background: #0f1830;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .lang-btn:hover { border-color: var(--accent); }
    .lang-btn.active {
      background: var(--brand);
      color: #122100;
      border-color: var(--brand);
    }

    .hero {
      background: linear-gradient(140deg, rgba(59, 164, 255, 0.16), rgba(155, 221, 0, 0.12));
      border: 1px solid #35518b;
      border-radius: 20px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155, 221, 0, 0.28), transparent 70%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.12;
      max-width: 780px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 2.2vw, 18px);
      max-width: 760px;
    }

    .cta-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--brand);
      color: #102000;
    }

    .btn-secondary {
      background: #192746;
      border: 1px solid #30436f;
      color: var(--text);
    }

    .grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      min-height: 145px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .route-list {
      margin: 0;
      padding-left: 17px;
      color: #d6e4ff;
      line-height: 1.5;
      font-size: 14px;
    }

    .route-list li { margin-bottom: 3px; }

    .promo {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .panel {
      background: linear-gradient(160deg, #122144 0%, #101a31 100%);
      border: 1px solid #2b3e67;
      border-radius: 16px;
      padding: 18px;
    }

    .panel-title {
      font-size: 14px;
      color: var(--brand);
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 800;
    }

    .ad-copy {
      margin: 0;
      color: #e9f3ff;
      line-height: 1.55;
    }

    footer {
      margin-top: 20px;
      color: #9cb1da;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="plane">✈</div>
        <div>airBaltic Campaign Studio</div>
      </div>
      <div class="lang-buttons" id="langButtons"></div>
    </div>

    <section class="hero">
      <h1 id="headline"></h1>
      <p class="subtitle" id="subtitle"></p>
      <div class="cta-row">
        <a class="btn btn-primary" href="#" id="ctaPrimary"></a>
        <a class="btn btn-secondary" href="#" id="ctaSecondary"></a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h3 id="routesA"></h3>
        <ul class="route-list" id="listA"></ul>
      </article>
      <article class="card">
        <h3 id="routesB"></h3>
        <ul class="route-list" id="listB"></ul>
      </article>
      <article class="card">
        <h3 id="routesC"></h3>
        <ul class="route-list" id="listC"></ul>
      </article>
      <article class="card">
        <h3 id="routesD"></h3>
        <ul class="route-list" id="listD"></ul>
      </article>
    </section>

    <section class="promo">
      <article class="panel">
        <p class="panel-title" id="socialTitle"></p>
        <p class="ad-copy" id="socialCopy"></p>
      </article>
      <article class="panel">
        <p class="panel-title" id="premiumTitle"></p>
        <p class="ad-copy" id="premiumCopy"></p>
      </article>
    </section>

    <footer id="footnote"></footer>
  </div>

    const ids = {
      headline: "headline",
      subtitle: "subtitle",
      ctaPrimary: "ctaPrimary",
      ctaSecondary: "ctaSecondary",
      routesA: "routesA",
      routesB: "routesB",
      routesC: "routesC",
      routesD: "routesD",
      socialTitle: "socialTitle",
      socialCopy: "socialCopy",
      premiumTitle: "premiumTitle",
      premiumCopy: "premiumCopy",
      footnote: "footnote"
    };

    function renderList(targetId, items) {
      const el = document.getElementById(targetId);
      el.innerHTML = items.map((item) => `<li>${item}</li>`).join("");
    }

    function setLanguage(lang) {
      const t = translations[lang];
      Object.keys(ids).forEach((key) => {
        document.getElementById(ids[key]).textContent = t[key];
      });
      renderList("listA", t.listA);
      renderList("listB", t.listB);
      renderList("listC", t.listC);
      renderList("listD", t.listD);

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang;
    }

    function buildLanguageButtons() {
      const root = document.getElementById("langButtons");
      Object.keys(translations).forEach((lang) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.dataset.lang = lang;
        btn.type = "button";
        btn.textContent = translations[lang].label;
        btn.addEventListener("click", () => setLanguage(lang));
        root.appendChild(btn);
      });
    }

    buildLanguageButtons();
    setLanguage("en");
  </script>
</body>
</html>
